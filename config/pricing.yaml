currency: BRL
setup: { padrao: 3000, porta_assinatura: 0, degrau_13: true }
# Seats = limite de usuários por TENANT (transversal aos produtos). Base = maior
# tier ativo entre as assinaturas do tenant. Hard-block no convite; sem excedente.
seats:
  escopo: tenant
  base: maior_tier_ativo
  ao_exceder: bloquear
  por_tier: { start: 1, pro: 3, scale: 10 }
  contam_como_seat: [owner, admin, member]
  nao_contam: [super_admin_sapienza, agentes_ia]
  downgrade: bloquear_ate_remover_excedentes
produtos:
  margot:
    nome: "Margot Atendente"
    metric: "resposta"          # 1 resposta = 1 mensagem gerada e enviada pela IA
    tiers:
      - { id: start, mensal: 400,  incluso: 500 }
      - { id: pro,   mensal: 700,  incluso: 1500 }
      - { id: scale, mensal: 1200, incluso: 5000 }
    excedente_unitario: 0.50    # por resposta acima do incluso
    regras:
      handoff_max_mensagens: 15  # >15 respostas numa conversa -> handoff humano
      # Canal default é Evolution (não-oficial): sem janela grátis / conceito de
      # conversa, sem cobrança de Meta por mensagem. Custo/resposta = token IA.
      # janela_servico_meta_gratuita e disparo_ativo_marketing só voltam no driver meta.
  motor:
    nome: "Margot Editora"
    metric: "peca"              # PEÇA PUBLICADA (não gerada)
    tiers:
      - { id: start, mensal: 400,  incluso: 12, canais: 1 }
      - { id: pro,   mensal: 700,  incluso: 30, canais: 2 }
      - { id: scale, mensal: 1200, incluso: 60, canais: 3 }   # +blog SEO
    excedente_unitario: 25.0
    regras:
      janela_aprovacao_horas: 48         # silêncio = aprovado -> publica
      max_regeneracoes_por_peca: 2       # 3ª = pedido customizado (excedente)
      revisao_manual_sapienza: false
combo_sistema_sapienza:
  setup: 6000
  mensal_start: 1000
  assinatura: { setup: 0, mensal: 1600 }
portas_pagamento:
  - { id: obra,        entrada: 3000, premio_mensal_pct: 0 }
  - { id: meio_a_meio, entrada: 1500, premio_mensal_pct: 31 }
  - { id: assinatura,  entrada: 0,    premio_mensal_pct: 73 }
