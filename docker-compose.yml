# Um só Postgres (regra de ouro). Sem Redis: eventos vivem no Postgres
# (event_outbox + pg_notify) e a sessão NextAuth é JWT stateless.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sapienza
    # Sem `ports:` de propósito — o banco fica só na rede interna do compose. Se
    # precisar de acesso local (psql/drizzle-studio), use um override e nunca em
    # produção: a senha aqui é `postgres`.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sapienza"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sapienza
      # Fail-closed (`:?`): sem segredo o compose recusa subir. Um default aqui
      # viraria segredo público — o PRODUCT_JWT_SECRET é o que os data planes usam
      # p/ validar o JWT, então um valor conhecido permite forjar `tid` e ler o
      # dado de qualquer tenant. Gere com: openssl rand -base64 32
      AUTH_SECRET: ${AUTH_SECRET:?defina AUTH_SECRET (openssl rand -base64 32)}
      AUTH_TRUST_HOST: "true"
      PRODUCT_JWT_SECRET: ${PRODUCT_JWT_SECRET:?defina PRODUCT_JWT_SECRET (o MESMO valor no core, margot e motor)}
      # Secret dos jobs agendados (POST /api/cron/billing-close).
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?defina WEBHOOK_SECRET (segredo dos crons)}
      AGENT_TOKEN_ENC_KEY: ${AGENT_TOKEN_ENC_KEY:-}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
